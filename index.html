<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="body-container">

              <div class="Main-container">
              <div class="box-1">
                  <div class="image"><img src="./Google-logo-G-icon-symbol-2021-fc80008000ffff_1920x1080.jpg"></div>
                  <div class="Sing-In">
                      <h1>Sign In </h1>
                      <p>Use Your Google Account</p>
                  </div>
      
              </div>
      
              <div class="box-2">
                  <div class="placeholder">
                      <input type="text" placeholder="Email or Phone">
                  </div>
                  <div class="msg"><p>Forget Email ?</p></div>
                  <div class="text">
                      <p1>Not your Computer? Use Guest mode to sign in Privately.</p1>
                      <p2>Learn more about using Guest mode</p2>
                  </div>
                  <div class="button">
                      <div class="b1"><button>Create account</button></div>
                      <div class="b2"><button>Next</button></div>
                  </div>
              </div>
          </div>
      
          <div class="links">
              <div class="Language-Bar">
                  <select name="English (United States)"required>
                      <option value =>-- English (United States) --</option>
                      <option value="Hindhi">Hindhi</option>
                      <option value="Urdu">Urdu</option>
                      <option value="Japness">Japness</option>
                      <option value="English (UK)">English (UK)</option>
                  </select>
              </div>
              <div class="Ask">
                  <button>Help</button>
                  <button>Privacy</button>
                  <button>Term</button>
              </div>
          </div>

    </div>
</body>
</html>
